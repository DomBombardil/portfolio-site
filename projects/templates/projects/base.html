<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="{% static 'projects/css/styling.css' %}">
</head>

<body class="site-body">
<nav class="navbar navbar-expand-lg navbar-light bg-light site-navbar">
    <div class="container site-navbar-inner">
        <div class="navbar-brand-group">
            <a class="navbar-brand nav-link nav-cta site-brand {% if request.resolver_match.url_name == 'all_projects' %}active{% endif %}"
               href="{% url 'projects:all_projects' %}">
                <span class="site-brand-mark">DI</span>
                <span>Portfolio</span>
            </a>
            <a class="navbar-brand nav-link nav-cta {% if request.resolver_match.url_name == 'resume' %}active{% endif %}"
               href="{% url 'projects:resume' %}">Resume</a>
            <a class="navbar-brand nav-link nav-cta {% if request.resolver_match.url_name == 'certificates' %}active{% endif %}"
               href="{% url 'projects:certificates' %}">Certificates</a>
        </div>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item me-2 nav-right">
                    <a class="nav-link nav-cta {% if request.resolver_match.url_name == 'index' %}active{% endif %}"
                       href="{% url 'projects:index' %}">Home</a>
                </li>
                <li class="nav-item nav-right">
                    <a class="nav-link nav-cta {% if request.resolver_match.url_name == 'about_me' %}active{% endif %}"
                       href="{% url 'projects:about_me' %}">About me</a>
                </li>
                <li class="nav-item nav-right">
                    <a class="nav-link nav-cta {% if request.resolver_match.url_name == 'contact' %}active{% endif %}"
                       href="{% url 'projects:contact' %}">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4 site-main">
    {% block content %}
    {% endblock content %}
</main>

<!-- CTA FOOTER -->
<section class="py-5 text-center site-footer">
    <h2 class="fw-bold">Want to Work Together?</h2>
    <p class="lead">Feel free to reach out for projects, collaborations, or opportunities.</p>
    <a href="{% url 'projects:contact' %}" class="btn btn-success btn-lg btn-custom">Contact Me</a>
</section>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
